name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  # Secret scan — blocks commits that leak keys/tokens. Uses gitleaks; for a
  # public repo the default GITHUB_TOKEN is sufficient (no license key needed).
  # Especially important here: this repo holds ed25519 key generation + signing
  # code (keystore.mjs, sign.mjs) — a leaked private key would allow forged
  # signed submissions to the leaderboard.
  secret-scan:
    name: Secret scan (gitleaks)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      # gitleaks-action needs pull-requests: write to post review comments on
      # PRs. Without it the scan still runs and fails on leaks, but PR
      # annotations silently don't appear.
      pull-requests: write
    steps:
      - uses: actions/checkout@v7
        with:
          # Full history so gitleaks can scan past commits, not just the diff.
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          config-path: .github/gitleaks.toml

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18, 20, 22]
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
      - run: npm ci
      - run: node src/index.mjs --help
      - run: node -e "import('./src/cascade.mjs').then(m => console.log('cascade module OK'))"
      - run: node -e "import('./src/mcp-server.mjs').then(m => console.log('mcp-server module OK')).catch(e => { console.error(e); process.exit(1) })"
