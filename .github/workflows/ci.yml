name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18, 20, 22]
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
      - run: npm ci
      - run: node src/index.mjs --help
      - run: node -e "import('./src/cascade.mjs').then(m => console.log('cascade module OK'))"
      - run: node -e "import('./src/mcp-server.mjs').then(m => console.log('mcp-server module OK')).catch(e => { console.error(e); process.exit(1) })"
